name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore md2loop/md2loop.csproj

      - name: Build
        run: dotnet build md2loop/md2loop.csproj -c Release --no-restore

      - name: Publish (x64)
        run: |
          dotnet publish md2loop/md2loop.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=true `
            -o publish/win-x64
