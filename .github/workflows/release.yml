name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            arch: x64
          - rid: win-arm64
            arch: ARM64

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Get version from tag
        id: version
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Publish self-contained
        run: |
          dotnet publish md2loop/md2loop.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=${{ steps.version.outputs.VERSION }} `
            installer/md2loop.iss

      - name: Create portable ZIP
        run: |
          Compress-Archive -Path publish/* -DestinationPath dist/md2loop-${{ matrix.rid }}.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: md2loop-${{ matrix.rid }}
          path: |
            dist/md2loop-${{ matrix.rid }}.zip
            dist/md2loop-setup-*.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/md2loop-win-x64/*.zip
            artifacts/md2loop-win-x64/*.exe
            artifacts/md2loop-win-arm64/*.zip
            artifacts/md2loop-win-arm64/*.exe
